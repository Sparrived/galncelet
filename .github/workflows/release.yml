name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      publish:
        description: "Create or update the GitHub Release"
        required: false
        default: true
        type: boolean
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Received '$tag'."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Remove local MSVC linker override
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "src-tauri/.cargo/config.toml" -Force -ErrorAction SilentlyContinue

      - name: Build release package
        shell: pwsh
        run: |
          .\scripts\release.ps1 -Tag "${{ steps.release.outputs.tag }}" -AllowDirty -SkipRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: galncelet-${{ steps.release.outputs.tag }}
          path: |
            src-tauri/target/release/galncelet.exe
            src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: build-release
    if: github.event_name == 'push' || inputs.publish == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: galncelet-${{ github.ref_name != '' && github.ref_name || inputs.tag }}
          path: release-artifacts

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Received '$tag'."
          }

          $draft = [System.Convert]::ToBoolean("${{ inputs.draft }}")
          $prerelease = [System.Convert]::ToBoolean("${{ inputs.prerelease }}")
          $artifactRoot = Join-Path $PWD "release-artifacts"
          $files = Get-ChildItem -Path $artifactRoot -Recurse -File | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          }
          else {
            $args = @("release", "create", $tag)
            $args += $files
            $args += @("--title", $tag, "--generate-notes")
            if ($draft) { $args += "--draft" }
            if ($prerelease) { $args += "--prerelease" }
            gh @args
          }
