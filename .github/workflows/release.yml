name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve release tag
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      should_publish: ${{ steps.release.outputs.should_publish }}
    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $shouldPublish = "false"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $shouldPublish = "true"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Received '$tag'."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "should_publish=$shouldPublish" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build-release:
    name: Build release artifacts
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Remove local MSVC linker override
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "src-tauri/.cargo/config.toml" -Force -ErrorAction SilentlyContinue

      - name: Build release package
        shell: pwsh
        run: |
          .\scripts\release.ps1 -Tag "${{ needs.resolve.outputs.tag }}" -AllowDirty -SkipRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: |
            src-tauri/target/release/galncelet.exe
            src-tauri/target/release/bundle/**
          if-no-files-found: error

  verify-release:
    name: Verify release artifacts
    runs-on: windows-latest
    needs: [resolve, build-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: release-artifacts

      - name: Verify checksum file exists
        shell: pwsh
        run: |
          $checksum = Get-ChildItem -Path release-artifacts -Recurse -Filter SHA256SUMS.txt | Select-Object -First 1
          if (-not $checksum) {
            throw "SHA256SUMS.txt was not found in the downloaded release artifacts."
          }
          Write-Host "Found checksum file: $($checksum.FullName)"

      - name: Verify GUI subsystem script still parses
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content scripts/release.ps1 -Raw)) | Out-Null

  publish-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [resolve, build-release, verify-release]
    if: github.event_name == 'push' || needs.resolve.outputs.should_publish == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: release-artifacts

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.resolve.outputs.tag }}"
          $draft = [System.Convert]::ToBoolean("${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}")
          $prerelease = [System.Convert]::ToBoolean("${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}")
          $artifactRoot = Join-Path $PWD "release-artifacts"
          $files = Get-ChildItem -Path $artifactRoot -Recurse -File | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          }
          else {
            $args = @("release", "create", $tag)
            $args += $files
            $args += @("--title", $tag, "--generate-notes")
            if ($draft) { $args += "--draft" }
            if ($prerelease) { $args += "--prerelease" }
            gh @args
          }
