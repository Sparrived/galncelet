name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.0"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve release tag
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      should_publish: ${{ steps.release.outputs.should_publish }}
    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $shouldPublish = "true"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Received '$tag'."
          }
          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Release tag must look like v1.2.3. Received '$tag'."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "should_publish=$shouldPublish" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build-release:
    name: Build release artifacts
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Remove local MSVC linker override
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "src-tauri/.cargo/config.toml" -Force -ErrorAction SilentlyContinue

      - name: Build offline installer package
        shell: pwsh
        run: |
          .\scripts\release.ps1 -Version "${{ needs.resolve.outputs.version }}" -Tag "${{ needs.resolve.outputs.tag }}" -AllowDirty -SkipRelease -Offline

      - name: Build normal installer package
        shell: pwsh
        run: |
          .\scripts\release.ps1 -Version "${{ needs.resolve.outputs.version }}" -Tag "${{ needs.resolve.outputs.tag }}" -AllowDirty -SkipRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/galncelet.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Galncelet_${{ needs.resolve.outputs.version }}_x64_en-US.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Galncelet_${{ needs.resolve.outputs.version }}_x64-setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Galncelet_${{ needs.resolve.outputs.version }}_x64_en-US-offline.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Galncelet_${{ needs.resolve.outputs.version }}_x64-setup-offline.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS-offline.txt
          if-no-files-found: error

  verify-release:
    name: Verify release artifacts
    runs-on: windows-latest
    needs: [resolve, build-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: release-artifacts

      - name: Verify expected files exist
        shell: pwsh
        run: |
          $version = "${{ needs.resolve.outputs.version }}"
          $expected = @(
            "galncelet.exe",
            "Galncelet_${version}_x64_en-US.msi",
            "Galncelet_${version}_x64-setup.exe",
            "Galncelet_${version}_x64_en-US-offline.msi",
            "Galncelet_${version}_x64-setup-offline.exe",
            "SHA256SUMS.txt",
            "SHA256SUMS-offline.txt"
          )
          $files = Get-ChildItem -Path release-artifacts -Recurse -File
          foreach ($name in $expected) {
            if (-not ($files | Where-Object { $_.Name -eq $name })) {
              throw "Expected release artifact was not found: $name"
            }
          }
          $files | Sort-Object Name | ForEach-Object { Write-Host "$($_.Name) $($_.Length)" }

      - name: Verify checksum files
        shell: pwsh
        run: |
          Push-Location release-artifacts
          try {
            foreach ($checksum in @("SHA256SUMS.txt", "SHA256SUMS-offline.txt")) {
              $checksumFile = Get-ChildItem -Recurse -File -Filter $checksum | Select-Object -First 1
              if (-not $checksumFile) { throw "$checksum was not found." }
              foreach ($line in Get-Content $checksumFile.FullName) {
                if (-not $line.Trim()) { continue }
                $parts = $line -split '\s+', 2
                if ($parts.Count -ne 2) { throw "Invalid checksum line in ${checksum}: $line" }
                $relative = $parts[1] -replace '/', [System.IO.Path]::DirectorySeparatorChar
                $candidate = Join-Path $PWD $relative
                if (-not (Test-Path $candidate)) {
                  $candidate = Join-Path $PWD ([System.IO.Path]::GetFileName($relative))
                }
                if (-not (Test-Path $candidate)) { throw "Checksum target not found: $relative" }
                $actual = (Get-FileHash -Algorithm SHA256 -Path $candidate).Hash.ToLowerInvariant()
                if ($actual -ne $parts[0]) { throw "Checksum mismatch for $relative" }
              }
            }
          }
          finally {
            Pop-Location
          }

      - name: Verify release script parses
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content scripts/release.ps1 -Raw)) | Out-Null

  publish-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [resolve, build-release, verify-release]
    if: github.event_name == 'push' || needs.resolve.outputs.should_publish == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: galncelet-${{ needs.resolve.outputs.tag }}
          path: release-artifacts

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.resolve.outputs.tag }}"
          $draft = [System.Convert]::ToBoolean("${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}")
          $prerelease = [System.Convert]::ToBoolean("${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}")
          $artifactRoot = Join-Path $PWD "release-artifacts"
          $files = Get-ChildItem -Path $artifactRoot -Recurse -File | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          }
          else {
            $args = @("release", "create", $tag)
            $args += $files
            $args += @("--title", $tag, "--generate-notes")
            if ($draft) { $args += "--draft" }
            if ($prerelease) { $args += "--prerelease" }
            gh @args
          }
